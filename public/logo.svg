<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Hexagon filled body -->
  <polygon points="250,60 390,140 390,300 250,380 110,300 110,140" fill="#0A1F5C" />
  <!-- Hexagon teal outline -->
  <polygon points="250,60 390,140 390,300 250,380 110,300 110,140" fill="none" stroke="#00B4D8" stroke-width="8" />

  <!-- K letterform -->
  <rect x="195" y="145" width="28" height="175" fill="#FFFFFF" />
  <polygon points="223,145 320,145 272,232 223,232" fill="#FFFFFF" />
  <polygon points="223,232 272,232 325,320 258,320" fill="#00B4D8" />

  <!-- Circuit corner dots -->
  <circle cx="250" cy="60"  r="13" fill="#00B4D8" />
  <circle cx="390" cy="140" r="13" fill="#00B4D8" />
  <circle cx="390" cy="300" r="13" fill="#7DD8EC" />
  <circle cx="250" cy="380" r="13" fill="#7DD8EC" />
  <circle cx="110" cy="300" r="13" fill="#7DD8EC" />
  <circle cx="110" cy="140" r="13" fill="#00B4D8" />

  <!-- Circuit extension lines + end dots -->
  <line x1="110" y1="140" x2="55"  y2="107" stroke="#00B4D8" stroke-width="4" />
  <circle cx="55"  cy="107" r="8" fill="#00B4D8" />

  <line x1="250" y1="60"  x2="250" y2="18"  stroke="#00B4D8" stroke-width="4" />
  <circle cx="250" cy="18"  r="8" fill="#00B4D8" />

  <line x1="390" y1="140" x2="445" y2="107" stroke="#7DD8EC" stroke-width="4" />
  <circle cx="445" cy="107" r="8" fill="#7DD8EC" />

  <line x1="390" y1="300" x2="445" y2="333" stroke="#7DD8EC" stroke-width="4" />
  <circle cx="445" cy="333" r="8" fill="#7DD8EC" />

</svg>
