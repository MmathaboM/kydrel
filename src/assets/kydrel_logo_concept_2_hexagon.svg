  <!-- Wordmark -->
  <text x="200" y="88" style="fill:rgb(10, 31, 92);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:46px;font-weight:700;text-anchor:start;dominant-baseline:auto">KYDREL</text>
  <text x="203" y="115" style="fill:rgb(0, 180, 216);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">TECHNOLOGIES</text>
